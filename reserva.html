<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reserva Transfer | VTC CLASS</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;

background-image:url("fondo-praktik-bakery.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* capa oscura */

body:before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* logo */

.logo-vtc{
text-align:center;
margin-top:40px;
}

.logo-vtc img{
width:140px;
}

/* titulo */

.titulo-vtc{
text-align:center;
color:white;
font-size:34px;
margin-top:10px;
letter-spacing:2px;
}

/* formulario */

.form-reserva{

width:420px;
margin:auto;
margin-top:30px;

background:rgba(0,0,0,0.75);

padding:35px;

border-radius:12px;

}

/* campos */

.form-reserva select,
.form-reserva input{

width:100%;
padding:12px;

margin-top:10px;

border-radius:6px;
border:none;

font-size:14px;

}

/* precio */

.precio{
color:white;
font-size:24px;
text-align:center;
margin-top:20px;
}

/* boton */

.btn-reserva{

width:100%;
padding:14px;
margin-top:10px;

border:none;
border-radius:6px;

background:#f2c200;

font-weight:bold;
font-size:16px;

cursor:pointer;

}

.btn-reserva:hover{
background:#d9ae00;
}

</style>

</head>

<body>

<div class="logo-vtc">
<img src="logo-vtcclass.png">
</div>

<div class="titulo-vtc">
VTC CLASS TRANSFERS
</div>

<div class="form-reserva">

<h2 style="color:white;text-align:center">RESERVA TRANSFER</h2>


<label>ORIGEN</label>
<select id="origen">

<option value="">ORIGEN</option>

<option>Aeropuerto Barcelona</option>
<option>Puerto Barcelona</option>
<option>Estación Sants</option>
<option>Hotel Praktik Bakery</option>
<option>Hotel W Barcelona</option>
<option>Hotel Arts Barcelona</option>
<option>Hotel Majestic Barcelona</option>
<option>Hotel Mandarin Oriental</option>

</select>


<label>DESTINO</label>
<select id="destino">

<option value="">DESTINO</option>

<option>Aeropuerto Barcelona</option>
<option>Puerto Barcelona</option>
<option>Estación Sants</option>
<option>Hotel Praktik Bakery</option>
<option>Hotel W Barcelona</option>
<option>Hotel Arts Barcelona</option>
<option>Hotel Majestic Barcelona</option>
<option>Hotel Mandarin Oriental</option>

</select>


<input type="date">

<input type="time">


<input placeholder="Nombre cliente">

<input placeholder="Teléfono">


<select>

<option>1 pasajero</option>
<option>2 pasajeros</option>
<option>3 pasajeros</option>
<option>4 pasajeros</option>

</select>


<input placeholder="Número vuelo">

<input placeholder="Número tren">

<input placeholder="Nombre barco">


<div class="precio">
Precio 53 €
</div>


<button class="btn-reserva">
PAGAR Y RESERVAR
</button>


</div>

</body>

</html>
