<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AGENDA OPERATIVA VTC CLASS</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:30px;
}

table{
width:95%;
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #555;
padding:8px;
font-size:14px;
}

th{
background:#111;
}

</style>

</head>

<body>

<h1>AGENDA OPERATIVA VTC CLASS</h1>

<input type="date" id="fechaFiltro">

<table id="tablaAgenda">

<tr>

<th>Hora</th>
<th>Origen</th>
<th>Destino</th>
<th>Cliente</th>
<th>Teléfono</th>
<th>Vuelo/Barco/Tren</th>
<th>Pax</th>
<th>Hotel</th>
<th>Precio</th>
<th>Conductor</th>
<th>Estado</th>

</tr>

</table>

<script>

window.onload=function(){

let origen=localStorage.getItem("origen")
let destino=localStorage.getItem("destino")
let fecha=localStorage.getItem("fecha")
let hora=localStorage.getItem("hora")
let pasajeros=localStorage.getItem("pasajeros")
let precio=localStorage.getItem("precio")

if(!origen){return}

let tabla=document.getElementById("tablaAgenda")

let fila=tabla.insertRow(-1)

fila.insertCell(0).innerHTML=hora
fila.insertCell(1).innerHTML=origen
fila.insertCell(2).innerHTML=destino
fila.insertCell(3).innerHTML="Cliente"
fila.insertCell(4).innerHTML="Telefono"
fila.insertCell(5).innerHTML="-"
fila.insertCell(6).innerHTML=pasajeros
fila.insertCell(7).innerHTML="Praktik"
fila.insertCell(8).innerHTML=precio+" €"
fila.insertCell(9).innerHTML="Asignar"
fila.insertCell(10).innerHTML="Pendiente"

}

</script>

</body>
</html>
