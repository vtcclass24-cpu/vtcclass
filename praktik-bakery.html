<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Reserva Transfer - Praktik Bakery</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background-image:url("fondo-praktik-bakery.jpg");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* capa oscura sobre la foto */

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
}

/* caja central */

.card{

position:relative;
width:420px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
z-index:2;

}

.logo{
text-align:center;
margin-bottom:10px;
}

.logo img{
width:120px;
}

.title{
text-align:center;
font-size:22px;
margin-bottom:20px;
font-weight:bold;
}

/* inputs */

input, select{

width:100%;
padding:12px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;

}

.row{
display:flex;
gap:10px;
}

/* botón */

button{

width:100%;
margin-top:20px;
padding:14px;
background:#25c05a;
border:none;
border-radius:6px;
font-size:16px;
color:white;
font-weight:bold;
cursor:pointer;

}

button:hover{
background:#1da34c;
}

.footer{
text-align:center;
margin-top:10px;
font-size:12px;
color:#666;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

<div class="logo">
<img src="logo-vtcclass.png">
</div>

<div class="title">
Reservar traslado
</div>

<input placeholder="Aeropuerto, Puerto, Sants o escribe dirección">

<input placeholder="Hotel Praktik Bakery">

<div class="row">

<input type="date">

<input type="time">

</div>

<select>
<option>1 pasajero</option>
<option>2 pasajeros</option>
<option>3 pasajeros</option>
<option>4 pasajeros</option>
</select>

<button>
Continuar
</button>

<div class="footer">
VTC CLASS • VIP Luxury Travel
</div>

</div>

</body>
</html>
